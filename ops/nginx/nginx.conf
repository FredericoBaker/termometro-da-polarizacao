events {
    worker_connections 1024;
}

http {
    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 10 requests/second per IP, burst up to 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream termopol_api {
        server api:8000;
    }

    # upstream termopol_frontend {
    #     server frontend:3000;
    # }

    # ── HTTP server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Certbot ACME challenge (must stay on HTTP)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Once you have a certificate, replace the blocks below with:
        #   return 301 https://$host$request_uri;
        # and enable the HTTPS server block at the bottom of this file.

        client_max_body_size 10m;

        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         DENY;
        add_header Referrer-Policy         no-referrer-when-downgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://termopol_api/;
        }

        # location / {
        #     proxy_pass http://termopol_frontend;
        # }
    }

    # ── HTTPS server (uncomment after running certbot) ────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     client_max_body_size 10m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000" always;
    #     add_header X-Content-Type-Options    nosniff;
    #     add_header X-Frame-Options           DENY;
    #     add_header Referrer-Policy           no-referrer-when-downgrade;
    #
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #
    #     location /api/ {
    #         limit_req zone=api_limit burst=20 nodelay;
    #         proxy_pass http://termopol_api/;
