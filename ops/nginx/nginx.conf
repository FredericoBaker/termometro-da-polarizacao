events {
    worker_connections 1024;
}

http {
    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 10 requests/second per IP, burst up to 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream termopol_api {
        server api:8000;
    }

    upstream termopol_frontend {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name termometrodapolarizacao.com.br www.termometrodapolarizacao.com.br;
    
        ssl_certificate     /etc/letsencrypt/live/termometrodapolarizacao.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/termometrodapolarizacao.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
    
        client_max_body_size 10m;
    
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options    nosniff;
        add_header X-Frame-Options           DENY;
        add_header Referrer-Policy           no-referrer-when-downgrade;
    
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://termopol_api/;
        }
    
        location / {
            proxy_pass http://termopol_frontend;
        }
    }
}
