events {
    worker_connections 1024;
}

http {
    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 10 requests/second per IP, burst up to 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── DNS resolver ──────────────────────────────────────────────────────────
    # Uses Docker's internal DNS so upstreams are re-resolved every 30s.
    # This prevents 502s when containers are recreated and get new IPs.
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name termometrodapolarizacao.com.br www.termometrodapolarizacao.com.br;
    
        ssl_certificate     /etc/letsencrypt/live/termometrodapolarizacao.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/termometrodapolarizacao.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
    
        client_max_body_size 10m;
    
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options    nosniff;
        add_header X-Frame-Options           DENY;
        add_header Referrer-Policy           no-referrer-when-downgrade;
    
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $upstream_api http://api:8000;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass $upstream_api;
        }

        location / {
            set $upstream_web http://web:3000;
            proxy_pass $upstream_web;
        }
    }
}
