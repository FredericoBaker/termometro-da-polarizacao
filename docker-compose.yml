services:
  nginx:
    image: nginx:alpine
    container_name: termopol-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: termopol-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renews certificates automatically every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: termopol-redis

  db:
    image: postgres:16
    container_name: termopol-db
    shm_size: "1gb"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - termopol_pgdata:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-migrations:
    image: postgres:16
    container_name: termopol-db-migrations
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-termopol}
      MIGRATIONS_DIR: /migrations
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ops/postgres/migrations:/migrations:ro
      - ./ops/postgres/run-migrations.sh:/scripts/run-migrations.sh:ro
    command: bash /scripts/run-migrations.sh
    restart: "no"

  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    container_name: termopol-web
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: termopol-api
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      CACHE_BYPASS: ${CACHE_BYPASS:-0}
    depends_on:
      db:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - ./services/api/src:/app/services/api/src:ro
      - ./libs/termopol_db/src:/libs/termopol_db/src:ro
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --root-path /api

volumes:
  termopol_pgdata:
  certbot_www:
  certbot_certs:
